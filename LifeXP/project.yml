name: LifeXP
options:
  bundleIdPrefix: com.lifexp
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LifeXP:
    type: application
    platform: macOS
    sources:
      - path: LifeXP
        excludes:
          - Info.plist
      - Shared
    info:
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.lifexp.oauth
            CFBundleURLSchemes:
              - lifexp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifexp.app
        CODE_SIGN_ENTITLEMENTS: LifeXP/LifeXP.entitlements
        PRODUCT_NAME: Life XP
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: LifeXP/LifeXP.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.lifexp.shared
    dependencies:
      - target: LifeXPWidgetExtension
        embed: embed-and-sign

  LifeXPWidgetExtension:
    type: extensionkit-extension
    platform: macOS
    product: LifeXPWidgetExtension
    sources:
      - path: LifeXPWidget
        excludes:
          - Info.plist
      - Shared
    info:
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifexp.app.widget
        CODE_SIGN_ENTITLEMENTS: LifeXPWidget/LifeXPWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: LifeXPWidget/LifeXPWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.lifexp.shared
