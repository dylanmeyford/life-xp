<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life XP</title>
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <div id="app">
    <!-- Draggable title bar region -->
    <header id="titlebar">
      <div class="titlebar-drag"></div>
      <div id="player-bar">
        <div id="player-level" class="badge">Lv 1</div>
        <div id="player-title">Novice</div>
        <div id="xp-bar-container">
          <div id="xp-bar-fill"></div>
          <span id="xp-bar-text">0 / 100 XP</span>
        </div>
        <div id="total-xp">0 XP</div>
      </div>
    </header>

    <!-- Navigation -->
    <nav id="sidebar">
      <button class="nav-btn active" data-page="goals">
        <span class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1a6.5 6.5 0 1 0 0 13A6.5 6.5 0 0 0 7.5 1zm0 1a5.5 5.5 0 1 1 0 11A5.5 5.5 0 0 1 7.5 2zm0 2a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm0 1a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zm0 1.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill="currentColor"/></svg>
        </span>
        Goals
      </button>
      <button class="nav-btn" data-page="chat">
        <span class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12.5 2h-10A1.5 1.5 0 0 0 1 3.5v7A1.5 1.5 0 0 0 2.5 12H5l2.5 2.5L10 12h2.5A1.5 1.5 0 0 0 14 10.5v-7A1.5 1.5 0 0 0 12.5 2zm.5 8.5a.5.5 0 0 1-.5.5H9.8L7.5 13.3 5.2 11H2.5a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 .5.5v7z" fill="currentColor"/></svg>
        </span>
        Coach
      </button>
      <button class="nav-btn" data-page="xp">
        <span class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1L9.33 5.36l4.67.38-3.55 3.08 1.07 4.57L7.5 10.9l-4.02 2.49 1.07-4.57L1 5.74l4.67-.38L7.5 1z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>
        </span>
        XP Log
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 0a1 1 0 0 1 .994.9l.124 1.24a5.5 5.5 0 0 1 1.06.44l.99-.74a1 1 0 0 1 1.327.1l.566.566a1 1 0 0 1 .1 1.327l-.74.99c.18.335.328.686.44 1.06l1.24.124A1 1 0 0 1 14.5 7v.8a1 1 0 0 1-.9.994l-1.24.124a5.5 5.5 0 0 1-.44 1.06l.74.99a1 1 0 0 1-.1 1.327l-.566.566a1 1 0 0 1-1.327.1l-.99-.74a5.5 5.5 0 0 1-1.06.44l-.124 1.24A1 1 0 0 1 7.5 15h-.8a1 1 0 0 1-.994-.9l-.124-1.24a5.5 5.5 0 0 1-1.06-.44l-.99.74a1 1 0 0 1-1.327-.1l-.566-.566a1 1 0 0 1-.1-1.327l.74-.99a5.5 5.5 0 0 1-.44-1.06L.6 8.794A1 1 0 0 1 0 7.8V7a1 1 0 0 1 .9-.994l1.24-.124a5.5 5.5 0 0 1 .44-1.06l-.74-.99a1 1 0 0 1 .1-1.327l.566-.566a1 1 0 0 1 1.327-.1l.99.74a5.5 5.5 0 0 1 1.06-.44L5.506.9A1 1 0 0 1 6.5 0h1zM7 5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"/></svg>
        </span>
        Settings
      </button>
    </nav>

    <!-- Pages -->
    <main id="content">
      <section id="page-goals" class="page active"></section>
      <section id="page-chat" class="page"></section>
      <section id="page-xp" class="page"></section>
      <section id="page-settings" class="page"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
